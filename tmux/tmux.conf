##### ==========================================================================
##### TMUX 12/10 - Arch + Ubuntu | C + NeoVim
##### ==========================================================================

##### --------------------------------------------------------------------------
##### TERMINAL, CORES E COMPATIBILIDADE COM NEOVIM
##### --------------------------------------------------------------------------

# Terminfo moderno dentro do tmux.
set -g default-terminal "tmux-256color"

# Ajuda terminais comuns a anunciar suporte RGB/true color dentro do tmux.
set -as terminal-overrides ",xterm-256color:RGB"

# Faz aplicacoes como Neovim perceberem troca de foco entre janelas/paineis.
set -g focus-events on

# Remove atraso perceptivel ao usar ESC no Vim/NeoVim.
set -sg escape-time 0


##### --------------------------------------------------------------------------
##### PREFIXO
##### --------------------------------------------------------------------------

# Troca Ctrl+b por Ctrl+a.
unbind C-b
set -g prefix C-a
bind C-a send-prefix


##### --------------------------------------------------------------------------
##### USABILIDADE GERAL
##### --------------------------------------------------------------------------

set -g mouse on
set -g history-limit 100000
set -g renumber-windows on
set -g allow-rename off
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g status-interval 5
setw -g automatic-rename off


##### --------------------------------------------------------------------------
##### SPLITS E JANELAS
##### --------------------------------------------------------------------------

# Remove atalhos padroes menos ergonomicos para dividir.
unbind %
unbind '"'

# Splits novos sempre abrem no diretorio atual do painel.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Nova janela tambem nasce no diretorio atual.
bind c new-window -c "#{pane_current_path}"

# Bancada padrao de estudo em C: prefixo + C.
bind C new-session -d -s c -n teoria -c "#{pane_current_path}" \; \
    new-window -t c:2 -n codigo -c "#{pane_current_path}" \; \
    new-window -t c:3 -n testes -c "#{pane_current_path}" \; \
    switch-client -t c:2

# Mostra/esconde a barra quando voce quiser.
bind b set -g status \; display-message "barra tmux: #{?status,on,off}"


##### --------------------------------------------------------------------------
##### NAVEGACAO E REDIMENSIONAMENTO
##### --------------------------------------------------------------------------

# Navegacao secundaria por paineis usando prefixo + hjkl.
# Nao conflita com o NeoVim porque exige prefixo antes.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionamento com prefixo + HJKL.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### --------------------------------------------------------------------------
##### COPY MODE ESTILO VIM
##### --------------------------------------------------------------------------

bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel


##### --------------------------------------------------------------------------
##### RECARGA RAPIDA
##### --------------------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "tmux.conf recarregado"


##### --------------------------------------------------------------------------
##### PLUGINS - TPM
##### --------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Integracao NeoVim <-> tmux
set -g @plugin 'christoomey/vim-tmux-navigator'

# Persistencia das sessoes
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Status bar
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Menu visual de comandos do tmux. Prefix-only: Ctrl+a depois Space.
set -g @plugin 'alexwforsythe/tmux-which-key'

# Gerenciador fuzzy de sessoes
set -g @plugin 'omerxx/tmux-sessionx'


##### --------------------------------------------------------------------------
##### CONFIGURACOES DOS PLUGINS
##### --------------------------------------------------------------------------

# tmux-resurrect:
# so restaura sessao de Vim/NeoVim se existir Session.vim;
# nao forca nada dentro do editor.
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum:
# salva a cada 15 min e restaura automaticamente ao iniciar o tmux.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-yank:
# copia mouse/selecao para o clipboard normal, nao para PRIMARY.
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# sessionx:
# prefixo + o abre o seletor de sessoes.
set -g @sessionx-bind 'o'
set -g @sessionx-prefix 'on'
set -g @sessionx-window-height '90%'
set -g @sessionx-window-width '80%'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-git-branch 'on'

# Compatibilidade deliberada com Ubuntu 22.04, que ainda traz fzf 0.29.
set -g @sessionx-legacy-fzf-support 'on'


##### --------------------------------------------------------------------------
##### CATPPUCCIN
##### --------------------------------------------------------------------------

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Carregamento manual recomendado pelo projeto Catppuccin.
if-shell '[ -f ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux ]' 'run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux'

# Carrega o which-key diretamente quando ja estiver instalado.
# Isso garante Ctrl+a depois Space mesmo antes/depois do ciclo do TPM.
if-shell '[ -f ~/.tmux/plugins/tmux-which-key/plugin.sh.tmux ]' 'run-shell ~/.tmux/plugins/tmux-which-key/plugin.sh.tmux'


##### --------------------------------------------------------------------------
##### STATUS BAR
##### --------------------------------------------------------------------------

set -g status on
set -g status-position bottom
set -g status-justify centre
set -g status-left-length 36
set -g status-right-length 42
set -g status-style "bg=#0b0f14,fg=#cdd6f4"

# Prefixo visivel so quando Ctrl+a foi apertado.
set -g @prefix_highlight_output_prefix " "
set -g @prefix_highlight_output_suffix " "
set -g @prefix_highlight_prefix_prompt "COMMAND"
set -g @prefix_highlight_fg "#0b0f14"
set -g @prefix_highlight_bg "#f9e2af"
set -g @prefix_highlight_show_copy_mode "on"
set -g @prefix_highlight_copy_prompt "COPY"
set -g @prefix_highlight_copy_mode_attr "fg=#0b0f14,bg=#fab387,bold"

# Esquerda: identidade da bancada + estado vivo do prefixo/copy-mode.
set -g status-left "#[fg=#0b0f14,bg=#89b4fa,bold] C-LAB #[fg=#89b4fa,bg=#0b0f14] #{prefix_highlight}"

# Centro: somente a janela atual. As outras ficam escondidas para nao virar
# uma falsa lista de "abas de terminal".
setw -g window-status-format ""
setw -g window-status-current-format "#[fg=#0b0f14,bg=#a6e3a1,bold]  #{?#{==:#W,zsh},terminal,#W}  "
setw -g window-status-separator ""

# Direita: so aparece quando existe um estado importante.
set -g status-right "#{?window_zoomed_flag,#[fg=#0b0f14,bg=#f9e2af,bold] FOCUS ,}"

set -g pane-border-style "fg=#1f2937"
set -g pane-active-border-style "fg=#89b4fa"
set -g display-panes-active-colour "#89b4fa"
set -g display-panes-colour "#6c7086"
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"


##### --------------------------------------------------------------------------
##### TPM - TEM QUE FICAR POR ULTIMO
##### --------------------------------------------------------------------------

if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' 'run ~/.tmux/plugins/tpm/tpm'
